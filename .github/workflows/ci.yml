name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Check import order (isort)
        run: isort --check-only .

      - name: Check formatting (black)
        run: black --check .

      - name: Lint (flake8)
        run: flake8 .

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: epic_events_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: epic_events_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
            DATABASE_URL: postgresql://epic_events_user:test_password@localhost/epic_events_test
            TEST_DATABASE_URL: postgresql://epic_events_user:test_password@localhost/epic_events_test
            SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
            pytest tests/unit/ tests/integration/ \
              --cov=. \
              --cov-report=xml:coverage.xml \
              --cov-report=term-missing \
              --cov-fail-under=80

      # Generates badges/coverage.svg from coverage.xml and commits it back
      # to the branch — the README references this file directly, so the badge
      # updates automatically on every push without any external paid service.
      - name: Generate coverage badge
        if: github.event_name == 'push'
        run: |
          pip install genbadge[coverage]
          mkdir -p docs/badges
          genbadge coverage -i coverage.xml -o docs/badges/coverage.svg

      - name: Commit updated coverage badge
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update coverage badge [skip ci]"
          file_pattern: docs/badges/coverage.svg
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Upload coverage report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
