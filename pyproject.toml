[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.venv
  | migrations
  | __pycache__
)/
'''

[tool.isort]
profile = "black"
line_length = 88
skip = [".venv", "migrations"]


[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "-v",
    "--cov=.",
    "--cov-report=term-missing",
    "--cov-report=html:tests/coverage_html",
    "--ignore=tests/functional",
]
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
log_cli_date_format = "%H:%M:%S"


[tool.coverage.run]
source = ["."]
omit = [
    ".venv/*",
    "migrations/*",
    "tests/*",
    "main.py",
    "config.py",
    "db/session.py",
    "cli/app.py",
    "views/*",
    "cli/commands.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "pass",
]
show_missing = true