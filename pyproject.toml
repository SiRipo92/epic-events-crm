[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.venv
  | migrations
  | __pycache__
)/
'''

[tool.isort]
profile = "black"
line_length = 88
skip = [".venv", "migrations"]

[tool.coverage.run]
source = ["."]
omit = [
    ".venv/*",
    "migrations/*",
    "tests/*",
    "main.py",
    "config.py",
    "db/session.py",
    "cli/app.py",
    "views/messages.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "pass",
]
show_missing = true